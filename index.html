<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Calculadora Simples</h1>
    </header>

    <main>

        <div class="num">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>0</button>
        </div>
        <div class="ops">
            <button>+</button>
            <button>-</button>
            <button>X</button>
            <button>/</button>
        </div>

    </main>

    <footer>Todos os direitos reservados</footer>

</body>

</html>
